<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>May the Force be with YOU </title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="scene">
    <div class="images">
        <img src="https://assets.codepen.io/907471/darkside.svg?v42" class="dark">
        <img src="https://assets.codepen.io/907471/lightside.svg?v42" class="light">
    </div>
    <label class="switch" id="switch" aria-label="Switch">
        <input type="checkbox">
        <div class="track">
            <div class="lightsaber">
                <div class="light"></div>
                <div class="grip"></div>
                <div class="dark"></div>
            </div>
            <div class="thumb">
                <div class="side dark-side">
                    <div class="circle">
                        <div class="sub-circle"></div>
                    </div>
                </div>
                <div class="side light-side">
                    <div class="circle">
                        <div class="sub-circle"></div>
                    </div>
                    <div class="top">
                        <div class="left"></div>
                        <div class="right"></div>
                    </div>
                    <div class="center">
                        <div class="item-1"></div>
                        <div class="item-2"></div>
                        <div class="item-3"></div>
                        <div class="item-4"></div>
                        <div class="item-5"></div>
                    </div>
                    <div class="bottom">
                        <div class="line"></div>
                    </div>
                </div>
            </div>
        </div>

    </label>
</div>
    <script src='https://codepen.io/konstantindenerz/pen/KKxvdPq.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
